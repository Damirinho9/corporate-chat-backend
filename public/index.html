        // ==================== SOCKET ====================
        function connectSocket() {
            socket = io(window.location.origin, {
                auth: { token }
            });

            socket.on('connect', () => {
                showToast('Подключено', 'success');
            });

            socket.on('disconnect', () => {
                showToast('Отключено от сервера', 'warning');
            });

            socket.on('new_message', (data) => {
                if (data.chatId === currentChatId) {
                    appendMessage(data.message);
                    scrollToBottom();
                }
                updateChatLastMessage(data.chatId, data.message);
            });

            socket.on('user_typing', (data) => {
                if (data.chatId === currentChatId && data.userId !== currentUser.id) {
                    const indicator = document.getElementById('typingIndicator');
                    indicator.textContent = `${data.userName} печатает...`;
                    indicator.style.display = 'block';
                }
            });

            socket.on('user_stop_typing', (data) => {
                if (data.chatId === currentChatId && data.userId !== currentUser.id) {
                    const indicator = document.getElementById('typingIndicator');
                    indicator.style.display = 'none';
                }
            });

            socket.on('user_online', (data) => {
                onlineUsers.add(data.userId);
                updateUserOnlineStatus(data.userId, true);
            });

            socket.on('user_offline', (data) => {
                onlineUsers.delete(data.userId);
                updateUserOnlineStatus(data.userId, false);
            });

            // Poll events
            socket.on('new_poll', (data) => {
                if (data.chatId === selectedChatId) {
                    loadMessages(selectedChatId);
                }
            });

            socket.on('poll_updated', (data) => {
                if (data.chatId === selectedChatId) {
                    // Update poll display in real-time
                    const pollContainer = document.querySelector(`[data-poll-id="${data.poll.id}"]`);
                    if (pollContainer && data.poll) {
                        // Re-render the poll
                        const messageEl = pollContainer.closest('.message');
                        if (messageEl) {
                            pollContainer.remove();
                            const pollHTML = renderPoll(data.poll, messageEl);
                            const messageContent = messageEl.querySelector('.message-bubble');
                            if (messageContent) {
                                messageContent.insertAdjacentHTML('afterend', pollHTML);
                            }
                        }
                    }
                }
            });

            socket.on('poll_closed', (data) => {
                if (data.chatId === selectedChatId) {
                    // Update poll display
                    const pollContainer = document.querySelector(`[data-poll-id="${data.poll.id}"]`);
                    if (pollContainer && data.poll) {
                        const messageEl = pollContainer.closest('.message');
                        if (messageEl) {
                            pollContainer.remove();
                            const pollHTML = renderPoll(data.poll, messageEl);
                            const messageContent = messageEl.querySelector('.message-bubble');
                            if (messageContent) {
                                messageContent.insertAdjacentHTML('afterend', pollHTML);
                            }
                        }
                    }
                }
            });

            socket.on('error', (err) => {
                showToast(err.message || 'Ошибка сокета', 'error');
            });
        }

        // ==================== ONLINE STATUS ====================
        async function loadOnlineUsers() {
            try {
                const res = await fetch(`${API_URL}/users/online`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    const data = await res.json();
                    onlineUsers.clear();
                    data.online.forEach(user => {
                        onlineUsers.add(user.id);
                        updateUserOnlineStatus(user.id, true);
                    });
                } else {
                    // Endpoint not available yet, will use WebSocket events only
                    console.warn('Online status endpoint not available, using WebSocket events only');
                }
            } catch (error) {
                // Silent fail - online status will work via WebSocket events
                console.warn('Online status API unavailable, using real-time updates only');
            }
        }

        function updateUserOnlineStatus(userId, isOnline) {
            // Update status indicators in chat list
            const chatElements = document.querySelectorAll(`.chat-item[data-user-id="${userId}"], .contact[data-user-id="${userId}"]`);
            chatElements.forEach(chatEl => {
                let indicator = chatEl.querySelector('.online-indicator');
                if (indicator) {
                    // Indicator already exists, just update its class
                    indicator.classList.toggle('online', isOnline);
                    indicator.classList.toggle('offline', !isOnline);
                } else {
                    // For dynamically created elements that don't have indicators yet
                    // The indicator will be added during next re-render
                    // We'll just trigger a re-render
                    requestAnimationFrame(() => renderChats());
                }
            });

            // Update status in chat header if this is the current chat
            if (currentChatId) {
                const chatHeader = document.querySelector('.chat-header h3');
                if (chatHeader) {
                    const chatInfo = chats.find(c => c.id === currentChatId);
                    if (chatInfo && chatInfo.type === 'direct' && chatInfo.otherUserId === userId) {
                        let headerIndicator = chatHeader.querySelector('.online-indicator');
                        if (!headerIndicator) {
                            headerIndicator = document.createElement('span');
                            headerIndicator.className = 'online-indicator';
                            chatHeader.appendChild(headerIndicator);
                        }
                        headerIndicator.classList.toggle('online', isOnline);
                        headerIndicator.classList.toggle('offline', !isOnline);
                    }
                }
            }
        }

        // ==================== TOAST ====================
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('removing');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        window.showToast = showToast; // Export for external modules

        // ==================== LOAD CHATS ====================
        let contacts = { departments: [], assistants: { users: [] } };

        function rebuildDirectChatLookup() {
            directChatByUser.clear();

            chats
                .filter(chat => chat && chat.type === 'direct')
                .forEach(chat => {
                    const chatId = Number(chat.id);
                    if (!chatId) {
                        return;
                    }

                    const participants = Array.isArray(chat.participants) ? chat.participants : [];

                    participants.forEach(participant => {
                        if (participant && participant.id) {
                            directChatByUser.set(participant.id, chatId);
                        }
                    });

                    const rawName = typeof chat.name === 'string' ? chat.name.trim() : '';
                    if (participants.length === 1) {
                        if (!rawName || rawName.toLowerCase() === 'direct') {
                            chat.name = participants[0].name || rawName || 'Личный чат';
                        }
                    }
                });
        }

        async function loadChats() {
            try {
                console.log('[loadChats] Начало загрузки...');
                // Загружаем чаты и контакты параллельно
                const [chatsResponse, contactsResponse] = await Promise.all([
                    fetch(`${API_URL}/chats`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    }),
                    fetch(`${API_URL}/contacts/structured`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    })
                ]);

                console.log('[loadChats] Статусы ответов:', {
                    chats: chatsResponse.status,
                    contacts: contactsResponse.status
                });

                if (!chatsResponse.ok) {
                    const error = await chatsResponse.json();
                    console.error('[loadChats] Ошибка чатов:', error);
                    showToast(`Ошибка загрузки чатов: ${error.error || chatsResponse.status}`, 'error');
                    return;
                }

                if (!contactsResponse.ok) {
                    const error = await contactsResponse.json();
                    console.error('[loadChats] Ошибка контактов:', error);
                    showToast(`Ошибка загрузки контактов: ${error.error || contactsResponse.status}`, 'error');
                    return;
                }

                const chatsData = await chatsResponse.json();
                const contactsData = await contactsResponse.json();

                console.log('[loadChats] Данные получены:', {
                    chatsCount: chatsData.chats?.length || 0,
                    departments: contactsData.departments?.length || 0,
                    assistants: contactsData.assistants?.users?.length || 0
                });

                chats = chatsData.chats || [];
                rebuildDirectChatLookup();
                contacts = contactsData || { departments: [], assistants: { users: [] } };

                renderChats();
                restoreLastActiveChat();
            } catch (err) {
                console.error('[loadChats] Критическая ошибка:', err);
                showToast(`Ошибка загрузки: ${err.message}`, 'error');
            }
        }

        // Создать или открыть прямой чат с пользователем
        async function openDirectChatWithUser(userId, userName) {
            try {
                console.log('[openDirectChat] Создание чата с пользователем:', { userId, userName });

                currentDirectContactId = userId;

                const response = await fetch(`${API_URL}/chats/direct`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ receiverId: userId })
                });

                console.log('[openDirectChat] Статус ответа:', response.status);

                let data = {};
                try {
                    data = await response.json();
                } catch (parseError) {
                    console.warn('[openDirectChat] Не удалось распарсить ответ:', parseError);
                }

                if (!response.ok) {
                    console.error('[openDirectChat] Ошибка от API:', data);
                    const message = data?.error || response.statusText || 'Не удалось создать чат';
                    showToast(`Ошибка: ${message}`, 'error');
                    throw new Error(message);
                }

                console.log('[openDirectChat] Ответ от API:', data);

                const chatId = Number(data.chatId);
                if (!chatId) {
                    throw new Error('Не удалось получить идентификатор чата');
                }

                const isNew = Boolean(data.isNew);
                let chatInCache = chats.find(chat => Number(chat.id) === chatId);

                if (isNew) {
                    console.log('[openDirectChat] Создан новый чат, обновляем список чатов');
                    await loadChats();
                    chatInCache = chats.find(chat => Number(chat.id) === chatId);
                }

                if (!chatInCache) {
                    console.log('[openDirectChat] Чат не найден в списке, выполняем дополнительную загрузку');
                    try {
                        const chatResponse = await fetch(`${API_URL}/chats/${chatId}`, {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });

                        if (chatResponse.ok) {
                            const chatPayload = await chatResponse.json();
                            const chatData = chatPayload?.chat;
                            if (chatData) {
                                chats.push({
                                    id: chatData.id,
                                    name: chatData.name || userName,
                                    type: chatData.type || 'direct',
                                    department: chatData.department || null,
                                    participants: chatData.participants || [],
                                    unread_count: 0
                                });
                                rebuildDirectChatLookup();
                                renderChats();
                                chatInCache = chats.find(chat => Number(chat.id) === chatId);
                                console.log('[openDirectChat] Чат добавлен из дополнительной загрузки');
                            }
                        } else {
                            console.warn('[openDirectChat] Не удалось напрямую загрузить чат, выполняем полную перезагрузку списка');
                            await loadChats();
                            chatInCache = chats.find(chat => Number(chat.id) === chatId);
                        }
                    } catch (fetchError) {
                        console.error('[openDirectChat] Ошибка при дополнительной загрузке чата:', fetchError);
                        await loadChats();
                        chatInCache = chats.find(chat => Number(chat.id) === chatId);
                    }
                }

                if (!chatInCache) {
                    throw new Error('Чат не найден среди доступных после обновления');
                }

                await openChat(chatId);
                showToast(`Чат с ${userName} открыт`, 'success');
            } catch (err) {
                currentDirectContactId = null;
                console.error('[openDirectChat] Критическая ошибка:', err);
                showToast(err.message || 'Ошибка создания чата', 'error');
            }
        }

        // ==================== HELPER FUNCTIONS ====================
        function formatTimestamp(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return 'сейчас';
            if (minutes < 60) return `${minutes}м`;
            if (hours < 24) return `${hours}ч`;
            if (days < 7) return `${days}д`;
            return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        }

        // ==================== CHAT SEARCH ====================
        let chatSearchQuery = '';
        let activeSectionFilter = 'all';

        function filterChats(query) {
            chatSearchQuery = query.toLowerCase();
            renderChats();
        }

        function filterBySection(section) {
            activeSectionFilter = section;

            // Update nav buttons
            document.querySelectorAll('.section-nav-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.section === section);
            });

            renderChats();
        }

        function getDepartmentIdentifier(name = '') {
            if (!name) return '';
            const numberMatch = String(name).match(/\d+/);
            if (numberMatch) {
                return numberMatch[0];
            }
            return String(name).trim().toLowerCase();
        }

        function getDepartmentKey(name = '') {
            return String(name)
                .toLowerCase()
                .trim()
                .replace(/\s+/g, '-')
                .replace(/[^a-z0-9а-яё-]/gi, '');
        }

        function toggleDepartment(event, deptKey) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }

            if (expandedDepartments.has(deptKey)) {
                expandedDepartments.delete(deptKey);
            } else {
                expandedDepartments.add(deptKey);
            }

            renderChats();
        }

        function renderChats() {
                const chatsList = document.getElementById('chatsList');

                if (!Array.isArray(chats) || chats.length === 0) {
                        chatsList.innerHTML = `
                                <div style="padding:20px;text-align:center;color:var(--text-secondary);">
                                        Нет доступных чатов
                                </div>`;
                        return;
                }

                // 1️⃣ Убираем дубли по name+type
                const unique = [];
                const seen = new Set();
                for (const chat of chats) {
                        const key = `${chat.name || ''}_${chat.type || ''}`;
                        if (!seen.has(key)) {
                                seen.add(key);
                                unique.push(chat);
                        }
                }

                // 2️⃣ Обновляем отображение
                const filteredChats = chatSearchQuery
                        ? unique.filter(chat => {
                                const name = (chat.name || '').toLowerCase();
                                const lastMsg = typeof chat.last_message === 'string'
                                        ? chat.last_message.toLowerCase()
                                        : (chat.last_message?.content || '').toLowerCase();
                                return name.includes(chatSearchQuery) || lastMsg.includes(chatSearchQuery);
                        })
                        : unique;

                if (filteredChats.length === 0) {
                        chatsList.innerHTML = `
                                <div style="padding:20px;text-align:center;color:var(--text-secondary);">
                                        Чаты не найдены
                                </div>`;
                        return;
                }

                const renderChatItem = (chat, options = {}) => {
                        const { withArrow = false, deptKey = '', expanded = false, extraClass = '' } = options;
                        let lastMessageText = '';
                        let timestamp = '';

                        if (chat.last_message) {
                                if (typeof chat.last_message === 'object' && chat.last_message.content) {
                                        lastMessageText = escapeHtml(chat.last_message.content);
                                        timestamp = formatTimestamp(chat.last_message.created_at);
                                } else if (typeof chat.last_message === 'string') {
                                        lastMessageText = escapeHtml(chat.last_message);
                                }
                        }

                        // Check for draft
                        const draft = getDraft(chat.id);
                        const draftIndicator = draft ? `<span class="draft-indicator">📝</span>` : '';

                        if (draft) {
                                lastMessageText = `<span style="color: var(--warning);">Черновик: ${escapeHtml(draft.substring(0, 30))}${draft.length > 30 ? '...' : ''}</span>`;
                        } else if (!lastMessageText) {
                                lastMessageText = 'Пока тишина';
                        }

                        const chatName = escapeHtml(chat.name || 'Чат');

                        // Add online indicator for direct chats
                        const isOnline = chat.type === 'direct' && chat.otherUserId && onlineUsers.has(chat.otherUserId);
                        const onlineIndicator = chat.type === 'direct'
                                ? `<span class="online-indicator ${isOnline ? 'online' : 'offline'}"></span>`
                                : '';

                        const unreadBadge = chat.unread_count > 0
                                ? `<span class="unread-badge">${chat.unread_count}</span>`
                                : '';

                        const isActive = Number(chat.id) === Number(currentChatId);

                        // Add data-user-id attribute for direct chats
                        const userIdAttr = chat.type === 'direct' && chat.otherUserId
                                ? `data-user-id="${chat.otherUserId}"`
                                : '';

                        const content = `
                                <div class="chat-item-header">
                                        <span class="chat-name">${chatName}${onlineIndicator}${draftIndicator}</span>
                                        ${unreadBadge}
                                </div>
                                <div class="chat-last-message">
                                        <span class="chat-last-message-text">${lastMessageText}</span>
                                        ${timestamp
                                                ? `<span class="chat-timestamp">${timestamp}</span>`
                                                : ''}
                                </div>
                        `;

                        if (withArrow) {
                                const arrowClass = expanded ? 'department-toggle expanded' : 'department-toggle';
                                return `
                                        <li class="chat-item ${extraClass} ${isActive ? 'active' : ''}"
                                            data-chat-id="${chat.id}"
                                            ${userIdAttr}
                                            onclick="openChat(${chat.id})">
                                                <button class="${arrowClass}" onclick="toggleDepartment(event, '${deptKey}')">&#9656;</button>
                                                <div class="department-info">
                                                        ${content}
                                                </div>
                                        </li>
                                `;
                        }

                        return `
                                <li class="chat-item ${extraClass} ${isActive ? 'active' : ''}"
                                    data-chat-id="${chat.id}"
                                    ${userIdAttr}
                                    onclick="openChat(${chat.id})">
                                        ${content}
                                </li>
                        `;
                };

                // 3️⃣ Группировка по отделам и ролям
                const directChats = [];
                const usedChatIds = new Set();

                filteredChats.forEach(chat => {
                        if (chat.type === 'direct') {
                                directChats.push(chat);
                        }
                });

                const groupChats = filteredChats.filter(chat => chat.type !== 'direct');
                const departmentSections = [];
                const departmentContacts = Array.isArray(contacts.departments) ? contacts.departments : [];

                // Сначала привязываем чаты к отделам (включая "Ассистенты")
                departmentContacts.forEach(dept => {
                        const deptName = dept.department || '';
                        const deptKey = getDepartmentKey(deptName || `department-${dept.id || ''}`);
                        let mainChat = null;

                        const identifier = getDepartmentIdentifier(deptName);
                        if (identifier) {
                                mainChat = groupChats.find(chat => !usedChatIds.has(chat.id) && getDepartmentIdentifier(chat.name || '') === identifier);
                        }

                        if (!mainChat) {
                                mainChat = groupChats.find(chat => !usedChatIds.has(chat.id) && (chat.name || '').toLowerCase() === (deptName || '').toLowerCase());
                        }

                        if (mainChat) {
                                usedChatIds.add(mainChat.id);
                        }

                        departmentSections.push({
                                dept,
                                deptKey,
                                mainChat,
                                isExpanded: expandedDepartments.has(deptKey)
                        });
                });

                // Теперь среди оставшихся чатов ищем чаты ассистентов для отдельной секции
                const assistants = groupChats.filter(chat =>
                        !usedChatIds.has(chat.id) && /ассист/i.test(chat.name || '')
                );
                assistants.forEach(chat => usedChatIds.add(chat.id));

                groupChats
                        .filter(chat => !usedChatIds.has(chat.id) && /отдел/i.test(chat.name || ''))
                        .forEach(chat => {
                                const deptName = chat.name || 'Отдел';
                                const deptKey = getDepartmentKey(deptName);

                                if (!departmentSections.some(section => section.deptKey === deptKey)) {
                                        departmentSections.push({
                                                dept: { department: deptName, users: [] },
                                                deptKey,
                                                mainChat: chat,
                                                isExpanded: expandedDepartments.has(deptKey)
                                        });
                                }

                                usedChatIds.add(chat.id);
                        });

                const otherGroupChats = groupChats.filter(chat => !usedChatIds.has(chat.id));

                // Функция отрисовки контакта (пользователя для создания чата)
                const renderContactItem = (user, options = {}) => {
                        const { nested = false } = options;
                        const roleEmoji = {
                                'rop': '👔',
                                'operator': '👤',
                                'assistant': '🤝',
                                'employee': '👨‍💼',
                                'admin': '⚙️'
                        };
                        const emoji = roleEmoji[user.role] || '👤';
                        const role = getRoleDisplayName(user.role) || user.role || '';

                        const contactNestingClass = nested ? ' nested-contact' : '';
                        const directChatId = directChatByUser.get(user.id);
                        const isActive =
                                Number(directChatId) === Number(currentChatId) ||
                                (!directChatId && currentDirectContactId && Number(user.id) === Number(currentDirectContactId));
                        const chatAttr = directChatId ? ` data-chat-id="${directChatId}"` : '';

                        return `
                                <li class="chat-item contact-item${contactNestingClass}${isActive ? ' active' : ''}"
                                    data-contact-id="${user.id}"${chatAttr}
                                    onclick="openDirectChatWithUser(${user.id}, '${escapeHtml(user.name)}')">
                                        <div class="chat-item-header">
                                                <span class="chat-name">${emoji} ${escapeHtml(user.name)}</span>
                                        </div>
                                        <div class="chat-last-message">
                                                <span class="chat-last-message-text">${role}</span>
                                        </div>
                                </li>
                        `;
                };

                // Apply section filter
                let html = '';

                if (activeSectionFilter === 'all' || activeSectionFilter === 'Отделы') {
                        if (departmentSections.length > 0) {
                                html += `<div class="chat-section department-wrapper">
                                                <h4>Отделы</h4>
                                                <div class="department-list">`;

                                departmentSections.forEach(section => {
                                        const deptName = escapeHtml(section.dept?.department || section.mainChat?.name || 'Отдел');
                                        const contactsList = Array.isArray(section.dept?.users) ? section.dept.users : [];
                                        const hasContacts = contactsList.length > 0;

                                        if (section.mainChat) {
                                                html += `<div class="department-section" data-department="${section.deptKey}">
                                                                <ul class="department-main-list">
                                                                        ${renderChatItem(section.mainChat, {
                                                                                withArrow: hasContacts,
                                                                                deptKey: section.deptKey,
                                                                                expanded: section.isExpanded,
                                                                                extraClass: 'department-main'
                                                                        })}
                                                                </ul>`;
                                        } else if (hasContacts) {
                                                html += `<div class="department-section" data-department="${section.deptKey}">
                                                                <div class="chat-item department-main disabled">
                                                                        <button class="department-toggle ${section.isExpanded ? 'expanded' : ''}" onclick="toggleDepartment(event, '${section.deptKey}')">&#9656;</button>
                                                                        <div class="department-info">
                                                                                <div class="chat-item-header">
                                                                                        <span class="chat-name">${deptName}</span>
                                                                                </div>
                                                                                <div class="chat-last-message">
                                                                                        <span class="chat-last-message-text">Нет группового чата</span>
                                                                                </div>
                                                                        </div>
                                                                </div>`;
                                        } else {
                                                html += `<div class="department-section" data-department="${section.deptKey}">
                                                                <div class="chat-item department-main disabled">
                                                                        <div class="department-info">
                                                                                <div class="chat-item-header">
                                                                                        <span class="chat-name">${deptName}</span>
                                                                                </div>
                                                                                <div class="chat-last-message">
                                                                                        <span class="chat-last-message-text">Нет доступных чатов</span>
                                                                                </div>
                                                                        </div>
                                                                </div>`;
                                        }

                                        if (hasContacts) {
                                                html += `<ul class="department-contacts ${section.isExpanded ? 'expanded' : ''}">
                                                                ${contactsList.map(user => renderContactItem(user, { nested: true })).join('')}
                                                        </ul>`;
                                        }

                                        html += `</div>`;
                                });

                                html += `</div></div>`;
                        }

                        if (otherGroupChats.length > 0) {
                                html += `<div class="chat-section">
                                                <h4>Групповые чаты</h4>
                                                <ul>${otherGroupChats.map(chat => renderChatItem(chat)).join('')}</ul>
                                        </div>`;
                        }
                }

                if (activeSectionFilter === 'all' || activeSectionFilter === 'Ассистенты') {
                        // Убрали отдельную секцию "Ассистенты" с контактами, т.к. они уже показываются в отделе "Ассистенты"
                        // Оставляем только групповые чаты ассистентов, которые не являются department-type
                        if (assistants.length > 0) {
                                html += `<div class="chat-section">
                                        <h4>Ассистенты (Групповой чат)</h4>
                                        <ul>${assistants.map(renderChatItem).join('')}</ul>
                                </div>`;
                        }
                }

                if (activeSectionFilter === 'all' && directChats.length > 0) {
                        html += `<div class="chat-section">
                                        <h4>Личные чаты</h4>
                                        <ul>${directChats.map(chat => renderChatItem(chat)).join('')}</ul>
                                </div>`;
                }

                chatsList.innerHTML = html || `
                        <div style="padding:20px;text-align:center;color:var(--text-secondary);">

        function syncContactHighlights() {
            const contactItems = document.querySelectorAll('.contact-item');
            if (contactItems.length === 0) {
                return;
            }

            if (!currentDirectContactId) {
                contactItems.forEach(item => {
                    const chatId = item.dataset.chatId;
                    if (!chatId || Number(chatId) !== Number(currentChatId)) {
                        item.classList.remove('active');
                    }
                });
                return;
            }

            contactItems.forEach(item => {
                const contactId = Number(item.dataset.contactId);
                if (contactId === Number(currentDirectContactId)) {
                    item.classList.add('active');
                } else if (!item.dataset.chatId || Number(item.dataset.chatId) !== Number(currentChatId)) {
                    item.classList.remove('active');

        // ==================== OPEN CHAT ====================
        async function openChat(chatId) {
            console.log('[openChat] Открытие чата:', chatId);
            // Mobile: hide sidebar, show chat
            if (window.innerWidth <= 768) {
                document.querySelector('.sidebar')?.classList.add('hidden');
                document.querySelector('.main-chat')?.classList.remove('hidden');
            }

            currentChatId = Number(chatId);

                // Save last active chat to localStorage
                localStorage.setItem('lastActiveChatId', chatId);

            document.querySelectorAll('.chat-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelectorAll(`[data-chat-id="${chatId}"]`).forEach(item => item.classList.add('active'));

                document.getElementById('chatHeader').classList.remove('hidden');

                // Enable input field
                const messageInput = document.getElementById('messageInput');
                const sendBtn = document.getElementById('sendBtn');
                const attachBtn = document.getElementById('attachBtn');

                messageInput.disabled = false;
                messageInput.placeholder = 'Напишите сообщение...';
                sendBtn.disabled = false;
                attachBtn.disabled = false;

                // Enable poll button for admins and ROPs
                const pollBtn = document.getElementById('pollBtn');
                if (pollBtn && currentUser && (currentUser.role === 'admin' || currentUser.role === 'rop')) {
                    pollBtn.style.display = 'inline-block';
                    pollBtn.disabled = false;
                }

                // Show markdown toolbar
                document.getElementById('markdownToolbar').style.display = 'flex';

                // Restore draft if exists
                const draft = getDraft(chatId);
                if (draft) {
                    messageInput.value = draft;
                    console.log('📝 Draft restored for chat', chatId);
                } else {
                    messageInput.value = '';
                }

                // Refresh layout metrics after showing chat header
                requestAnimationFrame(refreshLayoutMetrics);

                messageInput.focus();

            const chat = chats.find(c => c.id === chatId);
            if (chat) {
                let title = chat.name || 'Чат';
                let subtitle = '';

                if (chat.type === 'direct') {
                    const participants = Array.isArray(chat.participants) ? chat.participants : [];
                    const partner = participants.find(p => Number(p.id) !== Number(currentUser?.id)) || participants[0];
                    currentDirectContactId = partner?.id || null;
                    if (partner?.name) {
                        title = partner.name;
                    }
                    const roleLabel = partner?.role ? getRoleDisplayName(partner.role) : '';
                    subtitle = roleLabel ? `Личный чат • ${roleLabel}` : 'Личный чат';
                } else if (chat.type === 'group') {
                    currentDirectContactId = null;
                    subtitle = 'Групповой чат';
                } else if (chat.type === 'department') {
                    currentDirectContactId = null;
                    subtitle = 'Отдел';
                } else if (chat.type) {
                    currentDirectContactId = null;
                    subtitle = chat.type;
                } else {
                    currentDirectContactId = null;
                }

                document.getElementById('chatTitle').textContent = title;
                document.getElementById('chatSubtitle').textContent = subtitle;

                // Показываем кнопки звонков:
                // - Для личных чатов - всегда
                // - Для групповых и отделов - только для admin и rop
                const callButtons = document.getElementById('callButtons');
                const userRole = currentUser?.role;

                if (chat.type === 'direct' && currentDirectContactId) {
                    // Личный чат - показываем всем
                    callButtons.style.display = 'flex';
                } else if ((chat.type === 'group' || chat.type === 'department') && (userRole === 'admin' || userRole === 'rop')) {
                    // Групповой чат или отдел - только админам и руководителям
                    callButtons.style.display = 'flex';
                } else {
                    callButtons.style.display = 'none';
                }
            }

            syncContactHighlights();

            await loadMessages(chatId);

            console.log('[openChat] Чат успешно открыт:', chatId);

            if (socket) {
                socket.emit('join_chat', { chatId });
            }
        }

        // ==================== VIDEO/AUDIO CALLS ====================

        async function initiateCall(callType) {
            if (!currentChatId) {
                showToast('Сначала откройте чат', 'error');
                return;
            }

            try {
                // Получаем токен из localStorage
                const token = localStorage.getItem('token');
                if (!token) {
                    showToast('Необходима авторизация', 'error');
                    return;
                }

                // Получаем информацию о чате
                const chat = chats.find(c => c.id === currentChatId);
                if (!chat) {
                    showToast('Чат не найден', 'error');
                    return;
                }

                // Отключаем кнопки на время создания звонка
                const audioBtn = document.getElementById('audioCallBtn');
                const videoBtn = document.getElementById('videoCallBtn');
                audioBtn.disabled = true;
                videoBtn.disabled = true;

                // Подготавливаем данные запроса
                const requestData = {
                    callType: callType,
                    chatId: currentChatId
                };

                // Для личных чатов добавляем participants
                if (chat.type === 'direct' && currentDirectContactId) {
                    requestData.participants = [Number(currentDirectContactId)];
                }

                const response = await fetch(`${API_URL}/calls/initiate`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Не удалось создать звонок');
                }

                const data = await response.json();
                const callId = data.call.id;
                const inviteLink = data.call.inviteLink;

                // Открываем окно звонка
                const callWindow = window.open(
                    `/call.html?callId=${callId}&token=${token}`,
                    `call_${callId}`,
                    'width=1200,height=800,menubar=no,toolbar=no,location=no,status=no'
                );

                if (!callWindow) {
                    showToast('Разрешите всплывающие окна для видеозвонков', 'error');
                } else {
                    // Для групповых звонков показываем invite link
                    if (chat.type === 'group' || chat.type === 'department') {
                        showInviteLinkModal(inviteLink, callType);
                    }
                    showToast(`${callType === 'audio' ? 'Аудио' : 'Видео'}звонок инициирован`, 'success');
                }

                // Включаем кнопки обратно
                audioBtn.disabled = false;
                videoBtn.disabled = false;

            } catch (error) {
                console.error('Error initiating call:', error);
                showToast(error.message || 'Ошибка при создании звонка', 'error');

                // Включаем кнопки обратно
                document.getElementById('audioCallBtn').disabled = false;
                document.getElementById('videoCallBtn').disabled = false;
            }
        }

        async function searchMessagesInChat(searchQuery) {
            if (!currentChatId || !searchQuery || searchQuery.trim().length < 2) {
                const searchResults = document.getElementById('searchResults');
                if (searchQuery && searchQuery.trim().length < 2) {
                    searchResults.innerHTML = '<div class="search-no-results">Введите минимум 2 символа</div>';
                } else {
                    searchResults.innerHTML = '';
                }
                return;
            }

            try {
                const response = await fetch(
                    `${API_URL}/chats/${currentChatId}/messages/search?query=${encodeURIComponent(searchQuery.trim())}`,
                    { headers: { 'Authorization': `Bearer ${token}` } }
                );

                if (!response.ok) {
                    throw new Error('Search failed');
                }

                const data = await response.json();
                displaySearchResults(data.messages, searchQuery.trim());
            } catch (error) {
                console.error('Search error:', error);
                const searchResults = document.getElementById('searchResults');
                searchResults.innerHTML = '<div class="search-no-results">Ошибка поиска</div>';
            }
        }

        function displaySearchResults(messages, searchQuery) {
            const searchResults = document.getElementById('searchResults');

            if (!messages || messages.length === 0) {
                searchResults.innerHTML = '<div class="search-no-results">Ничего не найдено</div>';
                return;
            }

            const resultsHTML = messages.map(msg => {
                const content = msg.content || '';
                // Highlight search query in content
                const highlighted = highlightText(escapeHtml(content), searchQuery);
                const date = formatTimestamp(msg.created_at);

                return `
                    <div class="search-result-item" onclick="jumpToMessage(${msg.id})">
                        <div class="search-result-user">${escapeHtml(msg.user_name || 'Неизвестный')}</div>
                        <div class="search-result-content">${highlighted}</div>
                        <div class="search-result-date">${date}</div>
                    </div>
                `;
            }).join('');

            searchResults.innerHTML = resultsHTML;
        }

        function highlightText(text, query) {
            if (!query) return text;
            const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
            return text.replace(regex, '<mark>$1</mark>');
        }

        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        async function jumpToMessage(messageId) {
            // Close search panel
            closeSearchPanel();

            // Check if message is already in view
            const existingMessage = document.querySelector(`[data-message-id="${messageId}"]`);

            if (existingMessage) {
                // Message is already loaded, just scroll to it
                scrollToMessage(existingMessage);
            } else {
                // Need to reload messages (message might be outside current view)
                await loadMessages(currentChatId);

                // Try again after loading
                const messageElement = document.querySelector(`[data-message-id="${messageId}"]`);
                if (messageElement) {
                    scrollToMessage(messageElement);
                }
            }
        }

        function scrollToMessage(messageElement) {
            // Remove previous highlights
            document.querySelectorAll('.message.search-highlight').forEach(el => {
                el.classList.remove('search-highlight');
            });

            // Add highlight to target message
            messageElement.classList.add('search-highlight');

            // Scroll to message
            messageElement.scrollIntoView({ behavior: 'smooth', block: 'center' });

            // Remove highlight after animation
            setTimeout(() => {
                messageElement.classList.remove('search-highlight');
            }, 3000);
        }

        // ==================== LOAD MESSAGES ====================
        async function loadMessages(chatId) {
            const messagesContainer = document.getElementById('messagesContainer');
            messagesContainer.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;"><div style="text-align:center;color:var(--text-secondary);"><div style="font-size:32px;margin-bottom:10px;">⏳</div><div>Загрузка сообщений...</div></div></div>';

            try {
                console.log('[loadMessages] Загрузка сообщений для chatId:', chatId);

                const response = await fetch(`${API_URL}/chats/${chatId}/messages`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                let rawBody = '';
                try {
                    rawBody = await response.text();
                } catch (readError) {
                    console.error('[loadMessages] Ошибка чтения ответа:', readError);
                }

                let data = {};
                if (rawBody) {
                    try {
                        data = JSON.parse(rawBody);
                    } catch (parseError) {
                        console.error('[loadMessages] Ошибка парсинга ответа:', parseError);
                    }
                }

                if (!response.ok) {
                    const message = data?.error || `Ошибка загрузки (${response.status})`;
                    console.warn('[loadMessages] Ответ с ошибкой:', { status: response.status, body: data });
                    messagesContainer.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">⚠️</div>
                            <h2>Нет доступа</h2>
                            <p>${escapeHtml(message)}</p>
                        </div>
                    `;
                    showToast(message, 'error');
                    return;
                }

                console.log('[loadMessages] Статус ответа:', response.status);

                messagesContainer.innerHTML = '';

                const messageList = Array.isArray(data.messages) ? data.messages : [];
                console.log('[loadMessages] Получено сообщений:', messageList.length);

                if (messageList.length > 0) {
                    messageList.forEach(msg => appendMessage(msg));
                    scrollToBottom(true);
                } else {
                    messagesContainer.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">💬</div>
                            <h2>Нет сообщений</h2>
                            <p>Начните разговор!</p>
                        </div>
                    `;
                }

                console.log('[loadMessages] Сообщения успешно загружены');

                // Refresh layout metrics after messages are loaded
                requestAnimationFrame(refreshLayoutMetrics);
            } catch (err) {
                console.error('[loadMessages] Критическая ошибка:', err);
                messagesContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <h2>Ошибка загрузки</h2>
                        <p>Не удалось загрузить сообщения</p>
                    </div>
                `;
                showToast('Ошибка загрузки сообщений', 'error');
            }
        }
        window.loadMessages = loadMessages; // Export for external modules

        function appendMessage(message, isTempSending = false) {
            const messagesContainer = document.getElementById('messagesContainer');

            const emptyState = messagesContainer.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const isOwn = message.user_id === currentUser.id;
            const userName = message.user_name || 'Unknown';
            const initials = userName.split(' ').map(n => n[0]).join('').toUpperCase() || '?';
            const avatarColor = getAvatarColor(userName);
            const time = new Date(message.created_at).toLocaleTimeString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit'
            });

            let replyHtml = '';
            if (message.reply_to) {
                replyHtml = `<div class="message-reply-to">
                    ↩️ ${message.reply_to.user_name}: ${message.reply_to.content || '📎'}
                </div>`;
            }

            let forwardHtml = '';
            if (message.forwarded_from) {
                forwardHtml = `<div class="message-forward-badge">
                    ➡️ Переслано от ${message.forwarded_from.user_name}
                </div>`;
            }

            let reactionsHtml = '';
            if (message.reactions && message.reactions.length > 0) {
                const reactionCounts = {};
                message.reactions.forEach(r => {
                    if (!reactionCounts[r.emoji]) {
                        reactionCounts[r.emoji] = { count: 0, users: [], hasOwn: false };
                    }
                    reactionCounts[r.emoji].count++;
                    reactionCounts[r.emoji].users.push(r.user_name);
                    if (r.user_id === currentUser.id) {
                        reactionCounts[r.emoji].hasOwn = true;
                    }
                });

                reactionsHtml = '<div class="message-reactions">' +
                    Object.entries(reactionCounts).map(([emoji, data]) =>
                        `<div class="reaction-item ${data.hasOwn ? 'own' : ''}"
                              onclick="${data.hasOwn ? `removeReaction(${message.id})` : `addReaction(${message.id}, '${emoji}')`}"
                              title="${data.users.join(', ')}">
                            ${emoji} ${data.count}

            const emojis = ['👍', '❤️', '😂', '😮', '😢', '🙏'];

            const messageEl = document.createElement('div');

                    ${replyHtml}
                    <div class="message-bubble markdown-content" id="message-content-${message.id}">

                    ${reactionsHtml}
                </div>
                ${!isTempSending && !message.isSending ? `
                <div class="message-actions">
                    <button class="action-btn" onclick="toggleMessageMenu(${message.id})" title="Меню">⋮</button>
                    <div class="message-dropdown" id="message-menu-${message.id}">
                        <div class="dropdown-item" onclick="setReplyTo({id: ${message.id}, content: '${escapeHtml(message.content || '📎').replace(/'/g, "\\'")}'}); closeAllMenus();">
                            <span>↩️</span>
                            <span>Ответить</span>
                        </div>
                        <div class="dropdown-item" onclick="showEmojiPickerInMenu(${message.id})">
                            <span>😊</span>
                            <span>Реакция</span>
                        </div>
                        <div class="emoji-picker-inline" id="emoji-picker-${message.id}" style="display: none;">
                            ${emojis.map(e => `<span class="emoji-btn" onclick="addReaction(${message.id}, '${e}'); closeAllMenus();">${e}</span>`).join('')}
                        </div>
                        <div class="dropdown-separator"></div>
                        <div class="dropdown-item" onclick="copyMessage('${escapeHtml(message.content || '').replace(/'/g, "\\'")}'); closeAllMenus();">
                            <span>📋</span>
                            <span>Копировать</span>
                        </div>
                        ${message.file_url ? `
                        <div class="dropdown-item" onclick="downloadFile('${message.file_url}', '${message.file_name || 'file'}'); closeAllMenus();">
                            <span>📥</span>
                            <span>Скачать</span>
                        </div>
                        ` : ''}
                        <div class="dropdown-item" data-permission="forward_message" onclick="forwardMessage(${message.id}); closeAllMenus();">
                            <span>➡️</span>
                            <span>Переслать</span>
                        </div>

                            <span>Закрепить</span>

                        </div>
                        ${!isOwn ? `
                        <div class="dropdown-separator"></div>
                        <div class="dropdown-item" data-permission="write_to_user" onclick="writeToUser(${message.user_id}, '${message.user_name}'); closeAllMenus();">
                            <span>💬</span>
                            <span>Написать автору</span>
                        </div>
                        ` : ''}
                        ${isOwn ? `

            }

        // Load and render poll for a message
        async function loadPollForMessage(messageId) {
            try {
                // Find poll by message_id
                const response = await fetch(`${API_URL}/polls/by-message/${messageId}`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });

                if (!response.ok) {
                    console.error('Failed to load poll for message:', messageId);
                    return;
                }

                const data = await response.json();
                const poll = data.poll;

                if (poll) {
                    // Find the message content element
                    const messageContentEl = document.getElementById(`message-content-${messageId}`);
                    if (messageContentEl) {
                        // Render poll below the message content
                        const pollHTML = renderPoll(poll, messageContentEl.parentElement);
                        messageContentEl.insertAdjacentHTML('afterend', pollHTML);
                    }
                }
            } catch (error) {
                console.error('Load poll error:', error);
            }
        }

        function scrollToBottom(force = false) {
            const container = document.getElementById('messagesContainer');
            const isNearBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 100;

            // Auto-scroll only if user is near bottom or force is true
            if (force || isNearBottom) {
                container.scrollTop = container.scrollHeight;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Render markdown with XSS protection
        function renderMarkdown(text) {
            if (!text) return '';

            // Configure marked for safe rendering
            marked.setOptions({
                breaks: true,  // Convert \n to <br>
                gfm: true,     // GitHub Flavored Markdown
                headerIds: false,
                mangle: false
            });

            // Parse markdown
            const html = marked.parse(text);

            // Sanitize with DOMPurify to prevent XSS
            return DOMPurify.sanitize(html, {
                ALLOWED_TAGS: ['b', 'i', 'em', 'strong', 'code', 'pre', 'p', 'br', 'ul', 'ol', 'li', 'a', 'blockquote', 'del', 'hr'],
                ALLOWED_ATTR: ['href', 'title', 'target'],
                ALLOW_DATA_ATTR: false
            });
        }

        // ==================== DRAFTS (LocalStorage) ====================
        function saveDraft(chatId, text) {
            if (!chatId) return;

            const drafts = getDrafts();
            if (text.trim()) {
                drafts[chatId] = text;
            } else {
                delete drafts[chatId];
            }

            try {
                localStorage.setItem('messageDrafts', JSON.stringify(drafts));
            } catch (e) {
                console.warn('Failed to save draft:', e);
            }
        }

        function getDraft(chatId) {
            if (!chatId) return '';
            const drafts = getDrafts();
            return drafts[chatId] || '';
        }

        function clearDraft(chatId) {
            if (!chatId) return;
            const drafts = getDrafts();
            delete drafts[chatId];

            try {
                localStorage.setItem('messageDrafts', JSON.stringify(drafts));
            } catch (e) {
                console.warn('Failed to clear draft:', e);
            }
        }

        function getDrafts() {
            try {
                const drafts = localStorage.getItem('messageDrafts');
                return drafts ? JSON.parse(drafts) : {};
            } catch (e) {
                console.warn('Failed to load drafts:', e);
                return {};
            }
        }

        function hasDraft(chatId) {
            return !!getDraft(chatId);
        }

        // Debounce helper
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Auto-save draft on input (debounced)
        const saveDraftDebounced = debounce((chatId, text) => {
            saveDraft(chatId, text);
            console.log('💾 Draft auto-saved for chat', chatId);
            // Update chat list to show draft indicator
            if (typeof loadChats === 'function') {
                loadChats();
            }
        }, 500);

        // Generate avatar color from name
        function getAvatarColor(name) {
            const colors = [
                '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8',
                '#F7DC6F', '#BB8FCE', '#85C1E2', '#F8B739', '#52B788'
            ];
            const hash = name.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
            return colors[hash % colors.length];
        }

        // ==================== SEND MESSAGE ====================
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const content = input.value.trim();

            console.log('[sendMessage] Starting send:', {
                content,
                contentLength: content.length,
                selectedFiles: selectedFiles.length,
                currentChatId
            });

            // Validation
            if (!content && selectedFiles.length === 0) {
                console.warn('[sendMessage] Validation failed: no content and no files');
                showToast('Введите сообщение или прикрепите файл', 'warning');
                return;
            }
            if (!currentChatId) {
                console.warn('[sendMessage] Validation failed: no chat selected');
                showToast('Выберите чат', 'warning');
                return;
            }

            // Disable send button and show sending indicator
            sendBtn.disabled = true;
            sendBtn.textContent = '⏳';
            input.disabled = true;

            // Create a temporary message element with "sending" state
            let tempMessageId = null;
            if (content && selectedFiles.length === 0) {
                tempMessageId = Date.now();
                const tempMessage = {
                    id: tempMessageId,
                    content: content,
                    user_id: currentUser.id,
                    user_name: currentUser.name || currentUser.username,
                    created_at: new Date().toISOString(),
                    isSending: true
                };
                appendMessage(tempMessage, true);
                scrollToBottom(true);
            }

            try {
                if (selectedFiles.length > 0) {
                    for (const fileObj of selectedFiles) {
                        const fileId = await uploadFile(fileObj);
                        const requestBody = {
                            content: content || null,
                            fileId: fileId,
                            replyToId: replyToMessage?.id || null
                        };
                        console.log('[sendMessage] Sending with file:', requestBody);

                        const response = await fetch(`${API_URL}/chats/${currentChatId}/messages`, {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${token}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(requestBody)
                        });

                        let data = {};
                        try {
                            data = await response.json();
                        } catch (error) {
                            console.warn('[sendMessage] Не удалось распарсить ответ сервера:', error);
                        }

                        if (!response.ok) {
                            const message = data?.error || `Ошибка отправки сообщения (${response.status})`;
                            throw new Error(message);
                        }

                        if (data.message) {
                            appendMessage(data.message);
                            scrollToBottom(true); // Force scroll after sending
                        }
                    }
                    selectedFiles = [];
                    renderPreviews();
                    uploadContainer.classList.remove('active');
                } else {
                    const requestBody = {
                        content,
                        replyToId: replyToMessage?.id || null
                    };
                    console.log('[sendMessage] Request body:', requestBody);

                    const response = await fetch(`${API_URL}/chats/${currentChatId}/messages`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(requestBody)
                    });

                    let data = {};
                    try {
                        data = await response.json();
                    } catch (error) {
                        console.warn('[sendMessage] Не удалось распарсить ответ сервера:', error);
                    }

                    if (!response.ok) {
                        const message = data?.error || `Ошибка отправки сообщения (${response.status})`;
                        throw new Error(message);
                    }

                    if (data.message) {
                        // Remove temp message and add real message
                        if (tempMessageId) {
                            const tempEl = document.querySelector(`[data-message-id="${tempMessageId}"]`);
                            if (tempEl) tempEl.remove();
                        }
                        appendMessage(data.message);
                        scrollToBottom(true);
                    } else {
                        // Remove temp message on error
                        if (tempMessageId) {
                            const tempEl = document.querySelector(`[data-message-id="${tempMessageId}"]`);
                            if (tempEl) tempEl.remove();
                        }
                        showToast('Ошибка отправки сообщения', 'error');
                    }
                }

                input.value = '';
                input.style.height = 'auto';

                // Clear draft after successful send
                clearDraft(currentChatId);
                console.log('🗑️ Draft cleared for chat', currentChatId);
                // Update chat list to remove draft indicator
                if (typeof loadChats === 'function') {
                    loadChats();
                }

                requestAnimationFrame(refreshLayoutMetrics);
                cancelReply();
            } catch (err) {
                // Remove temp message on error
                if (tempMessageId) {
                    const tempEl = document.querySelector(`[data-message-id="${tempMessageId}"]`);
                    if (tempEl) tempEl.remove();
                }
                console.error('[sendMessage] Ошибка отправки сообщения:', err);
                showToast(err.message || 'Ошибка отправки сообщения', 'error');
            } finally {
                // Re-enable send button and input
                sendBtn.disabled = false;
                sendBtn.textContent = '➤';
                input.disabled = false;
                input.focus();
                requestAnimationFrame(refreshLayoutMetrics);
            }
        }
