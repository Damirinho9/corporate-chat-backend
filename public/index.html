        // ==================== VOICE RECORDER ====================
        let mediaRecorder = null;
        let audioChunks = [];
        let voiceRecordingTimer = null;
        let voiceRecordingSeconds = 0;
        let audioContext = null;
        let analyser = null;
        let animationId = null;
        const MAX_VOICE_DURATION = 300; // 5 minutes in seconds

        async function toggleVoiceRecorder() {
            if (!currentChatId) {
                showToast('Выберите чат для отправки голосового сообщения', 'warning');
                return;
            }

            const panel = document.getElementById('voiceRecorderPanel');

            if (panel.classList.contains('hidden')) {
                // Start recording
                try {
                    await startVoiceRecording();
                } catch (error) {
                    console.error('Voice recording error:', error);
                    showToast('Ошибка доступа к микрофону', 'error');
                }
            } else {
                // Stop and send
                await stopVoiceRecording();
            }
        }

        async function startVoiceRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,      // Выключаем - может приглушать
                        noiseSuppression: false,      // Выключаем - может портить качество
                        autoGainControl: true,        // Авто-громкость оставляем
                        sampleRate: 48000,            // High quality sample rate
                        channelCount: 1,              // Mono для голоса
                        sampleSize: 16,               // 16-bit audio
                        latency: 0,                   // Низкая задержка
                        volume: 1.0                   // Максимальная громкость
                    }
                });

                audioChunks = [];
                voiceRecordingSeconds = 0;

                // Setup MediaRecorder with MAXIMUM quality settings
                const options = {
                    mimeType: 'audio/webm;codecs=opus',
                    audioBitsPerSecond: 256000  // 256 kbps - максимальное качество!
                };

                // Fallback for browsers that don't support webm
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options.mimeType = 'audio/ogg;codecs=opus';
                    options.audioBitsPerSecond = 256000;
                }

                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options.mimeType = 'audio/webm';
                    options.audioBitsPerSecond = 256000;
                }

                mediaRecorder = new MediaRecorder(stream, options);

                // Log actual settings
                console.log('🎤 Recording with:', options.mimeType, 'at', options.audioBitsPerSecond / 1000, 'kbps');
                console.log('📊 Stream settings:', stream.getAudioTracks()[0].getSettings());

                mediaRecorder.addEventListener('dataavailable', event => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                });

                mediaRecorder.addEventListener('stop', async () => {
                    // Stop all tracks
                    stream.getTracks().forEach(track => track.stop());

                    // Clean up visualization
                    stopWaveformVisualization();
                });

                // Start recording with 1 second timeslice for better quality
                mediaRecorder.start(1000);

                // Setup waveform visualization
                setupWaveformVisualization(stream);

                // Show panel
                const panel = document.getElementById('voiceRecorderPanel');
                panel.classList.remove('hidden');

                // Start timer
                updateVoiceTimer();
                voiceRecordingTimer = setInterval(() => {
                    voiceRecordingSeconds++;
                    updateVoiceTimer();

                    // Auto-stop at max duration
                    if (voiceRecordingSeconds >= MAX_VOICE_DURATION) {
                        stopVoiceRecording();
                        showToast('Достигнута максимальная длительность (5 минут)', 'info');
                    }
                }, 1000);

            } catch (error) {
                console.error('Failed to start voice recording:', error);
                throw error;
            }
        }

        function updateVoiceTimer() {
            const timer = document.getElementById('voiceTimer');
            const minutes = Math.floor(voiceRecordingSeconds / 60);
            const seconds = voiceRecordingSeconds % 60;
            timer.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        function setupWaveformVisualization(stream) {
            const canvas = document.getElementById('voiceWaveform');
            const ctx = canvas.getContext('2d');

            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            const source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);

            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                animationId = requestAnimationFrame(draw);

                analyser.getByteFrequencyData(dataArray);

                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg-secondary').trim();
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const barWidth = (canvas.width / bufferLength) * 2.5;
                let barHeight;
                let x = 0;

                const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();

                for (let i = 0; i < bufferLength; i++) {
                    barHeight = (dataArray[i] / 255) * canvas.height * 0.8;

                    ctx.fillStyle = accentColor;
                    ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);

                    x += barWidth + 1;
                }
            }

            draw();
        }

        function stopWaveformVisualization() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
        }

        async function stopVoiceRecording() {
            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                return;
            }

            return new Promise((resolve) => {
                mediaRecorder.addEventListener('stop', async () => {
                    // Clear timer
                    if (voiceRecordingTimer) {
                        clearInterval(voiceRecordingTimer);
                        voiceRecordingTimer = null;
                    }

                    // Hide panel
                    const panel = document.getElementById('voiceRecorderPanel');
                    panel.classList.add('hidden');

                    // Create audio blob
                    const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });

                    // Send voice message
                    await sendVoiceMessage(audioBlob, voiceRecordingSeconds);

                    resolve();
                }, { once: true });

                mediaRecorder.stop();
            });
        }

        function cancelVoiceRecording() {
            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                return;
            }

            mediaRecorder.addEventListener('stop', () => {
                // Clear timer
                if (voiceRecordingTimer) {
                    clearInterval(voiceRecordingTimer);
                    voiceRecordingTimer = null;
                }

                // Hide panel
                const panel = document.getElementById('voiceRecorderPanel');
                panel.classList.add('hidden');

                // Clean up
                audioChunks = [];
                stopWaveformVisualization();
            }, { once: true });

            mediaRecorder.stop();
            showToast('Запись отменена', 'info');
        }

        async function sendVoiceMessage(audioBlob, duration) {
            try {
                if (!currentChatId) {
                    showToast('Чат не выбран', 'error');
                    return;
                }

                // Convert blob to file
                const filename = `voice-${Date.now()}.webm`;
                const file = new File([audioBlob], filename, { type: audioBlob.type });

                // Upload file and create message in one request
                const formData = new FormData();
                formData.append('file', file);
                formData.append('content', `🎤 Голосовое сообщение (${formatVoiceDuration(duration)})`);

                const uploadResponse = await fetch(`${API_URL}/chats/${currentChatId}/upload`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });

                if (!uploadResponse.ok) {
                    const errorText = await uploadResponse.text();
                    console.error('Upload failed:', uploadResponse.status, errorText);
                    throw new Error(`Upload failed: ${uploadResponse.status}`);
                }

                const uploadData = await uploadResponse.json();

                // Check if message was created successfully
                if (!uploadData.message && !uploadData.file) {
                    console.error('Unexpected response:', uploadData);
                    throw new Error('Invalid response from server');
                }

                showToast('Голосовое сообщение отправлено', 'success');

                // Reload messages to show the new voice message
                await loadMessages(currentChatId);

            } catch (error) {
                console.error('Failed to send voice message:', error);
                showToast('Ошибка отправки голосового сообщения', 'error');
            }
        }

        function formatVoiceDuration(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            if (mins > 0) {
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }
            return `${secs}с`;
        }

        // Audio player for messages
        const audioPlayers = new Map(); // messageId -> { audio, isPlaying }

        function playVoiceMessage(messageId, audioUrl) {
            // Stop other playing audios
            audioPlayers.forEach((player, id) => {
                if (id !== messageId && player.isPlaying) {
                    player.audio.pause();
                    player.isPlaying = false;
                    updatePlayButton(id, false);
                }
            });

            let player = audioPlayers.get(messageId);

            if (!player) {
                const audio = new Audio(audioUrl);
                player = { audio, isPlaying: false };
                audioPlayers.set(messageId, player);

                audio.addEventListener('ended', () => {
                    player.isPlaying = false;
                    updatePlayButton(messageId, false);
                    updateAudioProgress(messageId, 0);
                });

                audio.addEventListener('timeupdate', () => {
                    const progress = (audio.currentTime / audio.duration) * 100;
                    updateAudioProgress(messageId, progress);
                });
            }

            if (player.isPlaying) {
                player.audio.pause();
                player.isPlaying = false;
                updatePlayButton(messageId, false);
            } else {
                player.audio.play();
                player.isPlaying = true;
                updatePlayButton(messageId, true);
            }
        }

        function updatePlayButton(messageId, isPlaying) {
            const btn = document.querySelector(`[data-audio-btn="${messageId}"]`);
            if (btn) {
                btn.textContent = isPlaying ? '⏸' : '▶';
            }
        }

        function updateAudioProgress(messageId, progress) {
            const progressBar = document.querySelector(`[data-audio-progress="${messageId}"]`);
            if (progressBar) {
                progressBar.style.width = `${progress}%`;
            }
        }

                        })
                        .catch(error => {
                            console.error('❌ Service Worker registration failed:', error);
                        });
                });
            }
        });
